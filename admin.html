<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración — ChocolatitoWeb</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #000;
      min-height: 100dvh;
      color: #fff;
    }
    #particles-js { position: fixed; inset: 0; z-index: 0; background: #000; }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100dvh;
      padding: 30px 18px;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: #33FFFF;
      font-family: 'Arial Black', sans-serif;
      text-shadow: 0 0 14px rgba(51,255,255,0.6);
      text-align: center;
      margin-bottom: 6px;
      font-size: 1.8rem;
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.7);
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    /* ─── Login admin ─── */
    .admin-login-card {
      max-width: 380px; margin: 80px auto 0;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(51,255,255,0.3);
      border-radius: 14px;
      padding: 32px 28px;
      backdrop-filter: blur(6px);
    }
    .admin-login-card h2 {
      color: #33FFFF; margin-bottom: 18px; text-align: center; font-size: 1.3rem;
    }
    .admin-login-card input {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(51,255,255,0.3);
      border-radius: 8px;
      color: #fff; font-size: 0.95rem;
      outline: none; margin-bottom: 14px;
    }
    .admin-login-card input:focus { border-color: #33FFFF; box-shadow: 0 0 8px rgba(51,255,255,0.3); }

    /* ─── Botones ─── */
    .btn {
      padding: 9px 18px;
      border: 1px solid #33FFFF;
      background: transparent;
      color: #33FFFF;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover:not(:disabled) { background: #33FFFF; color: #000; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: #33FFFF; color: #000; border: none;
    }
    .btn-primary:hover:not(:disabled) { background: #00d6d6; }

    .btn-danger {
      border-color: #ff5470; color: #ff5470;
    }
    .btn-danger:hover:not(:disabled) { background: #ff5470; color: #fff; }

    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

    /* ─── Header con logout ─── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
      gap: 12px;
    }
    .top-bar .stats {
      color: rgba(255,255,255,0.8); font-size: 0.9rem;
    }
    .top-bar .stats strong { color: #33FFFF; }

    /* ─── Tarjeta crear usuario ─── */
    .create-card {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(51,255,255,0.25);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 22px;
    }
    .create-card h3 {
      color: #33FFFF; margin-bottom: 14px; font-size: 1.05rem;
    }
    .create-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 10px;
    }
    .create-grid input {
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      color: #fff; font-size: 0.88rem;
      outline: none;
    }
    .create-grid input:focus { border-color: #33FFFF; }

    /* ─── Tabla ─── */
    .table-wrap {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(51,255,255,0.25);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }
    th {
      background: rgba(51,255,255,0.08);
      color: #33FFFF;
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    td.id-col {
      font-family: 'Courier New', monospace;
      color: #33FFFF; font-weight: 700;
      letter-spacing: 1px;
    }
    td.actions {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .credits-input {
      width: 80px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #fff; font-size: 0.85rem;
    }

    /* ─── Mensajes ─── */
    .msg {
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 14px; font-size: 0.88rem;
      display: none;
    }
    .msg.show { display: block; animation: msg-in 0.2s ease; }
    @keyframes msg-in { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .msg.error  { background: rgba(255,84,112,0.15); border: 1px solid #ff5470; color: #ff8fa5; }
    .msg.ok     { background: rgba(74,222,128,0.12); border: 1px solid #4ade80; color: #86efac; }

    .empty {
      padding: 40px; text-align: center; color: rgba(255,255,255,0.5);
    }

    @media (max-width: 800px) {
      .create-grid { grid-template-columns: 1fr 1fr; }
      .create-grid .full { grid-column: 1 / -1; }
      th.hide-sm, td.hide-sm { display: none; }
      th, td { padding: 10px 8px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="wrapper">
  <h1>Panel de Administración</h1>
  <p class="subtitle">Gestiona los usuarios y sus créditos</p>

  <!-- ═══ LOGIN ADMIN ═══ -->
  <div id="login-view" class="admin-login-card">
    <h2><i class="fas fa-lock"></i> &nbsp;Acceso restringido</h2>
    <input type="password" id="admin-pass" placeholder="Contraseña de administrador" />
    <button class="btn btn-primary" id="admin-login-btn" style="width:100%;">Entrar</button>
    <div class="msg error" id="login-error"></div>
  </div>

  <!-- ═══ PANEL ═══ -->
  <div id="panel-view" style="display:none;">

    <div class="top-bar">
      <div class="stats">Total usuarios: <strong id="stat-total">0</strong></div>
      <button class="btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
    </div>

    <div class="msg ok"    id="ok-msg"></div>
    <div class="msg error" id="err-msg"></div>

    <!-- Crear nuevo usuario -->
    <div class="create-card">
      <h3><i class="fas fa-user-plus"></i> &nbsp;Crear nuevo usuario</h3>
      <div class="create-grid">
        <input type="text"     id="new-username" placeholder="Usuario *" />
        <input type="email"    id="new-email"    placeholder="Correo (opcional)" />
        <input type="text"     id="new-password" placeholder="Contraseña *" />
        <input type="number"   id="new-credits"  placeholder="Créditos" value="0" min="0" />
        <button class="btn btn-primary" id="create-btn">Crear</button>
      </div>
    </div>

    <!-- Lista -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID (8 dígitos)</th>
            <th>Usuario</th>
            <th class="hide-sm">Correo</th>
            <th>Créditos</th>
            <th class="hide-sm">Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
      <div class="empty" id="empty-state" style="display:none;">
        Aún no hay usuarios. Crea el primero arriba ↑
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://385fd47d-e4b4-4453-981e-7afca555f923-00-9lnnok86qrfn.picard.replit.dev/api";

/* ───── Partículas ───── */
particlesJS("particles-js", {
  particles: {
    number: { value: 60, density: { enable: true, value_area: 800 } },
    color: { value: ["#FF0000","#00FF00","#0000FF","#FFFF00","#00FFFF","#FF00FF"] },
    shape: { type: "circle" },
    opacity: { value: 0.4 },
    size: { value: 3, random: true },
    line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.3, width: 1 },
    move: { enable: true, speed: 4, out_mode: "bounce" }
  },
  interactivity: {
    detect_on: "canvas",
    events: { onhover: { enable: true, mode: "repulse" }, resize: true },
    modes: { repulse: { distance: 150, duration: 0.4 } }
  },
  retina_detect: true
});

/* ───── Estado ───── */
let adminToken = sessionStorage.getItem('cw_admin_token') || null;

/* ───── Mensajes ───── */
function showOk(msg)  { const el = document.getElementById('ok-msg');  el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
function showErr(msg) { const el = document.getElementById('err-msg'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 4000); }

/* ───── Login admin ───── */
document.getElementById('admin-login-btn').addEventListener('click', adminLogin);
document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

async function adminLogin() {
  const password = document.getElementById('admin-pass').value;
  const errEl    = document.getElementById('login-error');
  errEl.classList.remove('show');
  if (!password) { errEl.textContent = 'Ingresa la contraseña.'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('admin-login-btn');
  btn.disabled = true; btn.textContent = 'Verificando...';

  try {
    const res = await fetch(API_BASE + '/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Error.'; errEl.classList.add('show'); return; }
    adminToken = data.token;
    sessionStorage.setItem('cw_admin_token', adminToken);
    enterPanel();
  } catch {
    errEl.textContent = 'No se pudo conectar.'; errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function adminLogout() {
  sessionStorage.removeItem('cw_admin_token');
  adminToken = null;
  document.getElementById('panel-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('admin-pass').value = '';
}

async function enterPanel() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('panel-view').style.display = 'block';
  await loadUsers();
}

/* ───── Cargar usuarios ───── */
async function loadUsers() {
  try {
    const res = await fetch(API_BASE + '/admin/users', {
      headers: { Authorization: 'Bearer ' + adminToken }
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    renderUsers(data.users || []);
  } catch {
    showErr('No se pudo cargar la lista.');
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  const empty = document.getElementById('empty-state');
  document.getElementById('stat-total').textContent = users.length;

  tbody.innerHTML = '';
  if (users.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  users.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  for (const u of users) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="id-col">${u.id}</td>
      <td>${escapeHtml(u.username)}</td>
      <td class="hide-sm">${escapeHtml(u.email || '—')}</td>
      <td><input type="number" class="credits-input" value="${u.credits}" data-id="${u.id}" /></td>
      <td class="hide-sm">${new Date(u.createdAt).toLocaleDateString()}</td>
      <td class="actions">
        <button class="btn btn-sm" data-act="save"   data-id="${u.id}">Guardar</button>
        <button class="btn btn-sm" data-act="pass"   data-id="${u.id}" data-user="${escapeHtml(u.username)}">Pass</button>
        <button class="btn btn-sm btn-danger" data-act="del" data-id="${u.id}" data-user="${escapeHtml(u.username)}">Borrar</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

/* ───── Acciones (delegación) ───── */
document.getElementById('users-tbody').addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id   = btn.dataset.id;
  const act  = btn.dataset.act;
  const user = btn.dataset.user;

  if (act === 'save') {
    const input = document.querySelector(`.credits-input[data-id="${id}"]`);
    await updateUser(id, { credits: Number(input.value) });
  } else if (act === 'pass') {
    const newPass = prompt(`Nueva contraseña para "${user}":`);
    if (newPass && newPass.length > 0) await updateUser(id, { password: newPass });
  } else if (act === 'del') {
    if (confirm(`¿Eliminar al usuario "${user}" (ID ${id})? Esto no se puede deshacer.`)) {
      await deleteUser(id);
    }
  }
});

async function updateUser(id, patch) {
  try {
    const res = await fetch(API_BASE + '/admin/users/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + adminToken },
      body: JSON.stringify(patch)
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Error.'); return; }
    showOk('Actualizado.');
    loadUsers();
  } catch { showErr('No se pudo conectar.'); }
}

async function deleteUser(id) {
  try {
    const res = await fetch(API_BASE + '/admin/users/' + id, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + adminToken }
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); showErr(d.error || 'Error.'); return; }
    showOk('Usuario eliminado.');
    loadUsers();
  } catch { showErr('No se pudo conectar.'); }
}

/* ───── Crear ───── */
document.getElementById('create-btn').addEventListener('click', async () => {
  const username = document.getElementById('new-username').value.trim();
  const email    = document.getElementById('new-email').value.trim();
  const password = document.getElementById('new-password').value;
  const credits  = Number(document.getElementById('new-credits').value) || 0;

  if (!username || !password) { showErr('Usuario y contraseña son obligatorios.'); return; }

  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API_BASE + '/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + adminToken },
      body: JSON.stringify({ username, email: email || null, password, credits })
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Error.'); return; }
    showOk(`Usuario "${data.user.username}" creado con ID ${data.user.id}.`);
    document.getElementById('new-username').value = '';
    document.getElementById('new-email').value    = '';
    document.getElementById('new-password').value = '';
    document.getElementById('new-credits').value  = '0';
    loadUsers();
  } catch { showErr('No se pudo conectar.'); }
  finally { btn.disabled = false; btn.textContent = 'Crear'; }
});

/* ───── Si ya hay token, entrar directo ───── */
if (adminToken) {
  // Validar pidiendo la lista; si falla, vuelve al login
  enterPanel();
}
</script>
</body>
</html>
