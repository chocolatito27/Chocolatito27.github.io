<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chocolatito AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1a1a2e; color: #f0f0f0; height: 100dvh; display: flex; justify-content: center; align-items: center; }
    .app-shell { width: 100%; max-width: 700px; height: 100dvh; display: flex; flex-direction: column; background: #16213e; border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); }
    .chat-header { display: flex; align-items: center; gap: 10px; padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 1rem; font-weight: 600; }
    .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: #0f3460 transparent; }
    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }
    .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.93rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; animation: pop 0.18s ease; }
    .bubble.user { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
    .bubble.assistant { background: #1e2d50; color: #f0f0f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }
    .bubble.typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .bubble.typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #8892a4; animation: bounce 1.2s infinite; }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .chat-input-area { display: flex; align-items: flex-end; gap: 10px; padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); background: #16213e; }
    .chat-input { flex: 1; resize: none; background: #1e2d50; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px 16px; color: #f0f0f0; font-family: inherit; font-size: 0.93rem; line-height: 1.5; max-height: 140px; overflow-y: auto; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: #e94560; }
    .chat-input::placeholder { color: #8892a4; }
    .chat-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn { flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%; background: #e94560; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; }
    .send-btn:hover:not(:disabled) { background: #c73652; }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="app-shell">
  <header class="chat-header">
    <div class="header-dot"></div>
    <span>Chocolatito AI</span>
  </header>
  <main class="chat-messages" id="messages">
    <div class="bubble-row assistant">
      <div class="bubble assistant">Hola! Soy Chocolatito AI. ¿En qué te puedo ayudar hoy?</div>
    </div>
  </main>
  <footer class="chat-input-area">
    <textarea id="inputBox" class="chat-input" placeholder="Escribe un mensaje... (Enter para enviar)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Enviar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<script>
  const BACKEND_URL = "https://385fd47d-e4b4-4453-981e-7afca555f923-00-9lnnok86qrfn.picard.replit.dev/api/chat";

  const messagesEl = document.getElementById("messages");
  const inputBox = document.getElementById("inputBox");
  const sendBtn = document.getElementById("sendBtn");
  let history = [{ role: "assistant", content: "Hola! Soy Chocolatito AI. ¿En qué te puedo ayudar hoy?" }];

  function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addBubble(role, content, isTyping = false) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}${isTyping ? " typing" : ""}`;
    if (isTyping) { bubble.innerHTML = "<span></span><span></span><span></span>"; }
    else { bubble.textContent = content; }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollDown();
    return row;
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || sendBtn.disabled) return;
    history.push({ role: "user", content: text });
    addBubble("user", text);
    inputBox.value = "";
    inputBox.style.height = "auto";
    sendBtn.disabled = true;
    inputBox.disabled = true;
    const typingRow = addBubble("assistant", "", true);
    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? "Sin respuesta.";
      history.push({ role: "assistant", content: reply });
      typingRow.remove();
      addBubble("assistant", reply);
    } catch (err) {
      typingRow.remove();
      addBubble("assistant", "Error al conectar con el servidor.");
    } finally {
      sendBtn.disabled = false;
      inputBox.disabled = false;
      inputBox.focus();
    }
  }

  inputBox.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inputBox.addEventListener("input", () => { inputBox.style.height = "auto"; inputBox.style.height = Math.min(inputBox.scrollHeight, 140) + "px"; });
  sendBtn.addEventListener("click", sendMessage);
</script>

</body>
</html>
