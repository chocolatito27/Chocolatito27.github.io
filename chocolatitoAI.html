<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocolatitoAI</title>

  <!-- KaTeX (math) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

  <!-- highlight.js (code colors) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- marked (markdown) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- particles -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { font-family: Arial, sans-serif; background: #000; color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    #particles-js { position: fixed; inset: 0; z-index: 0; background-color: #000; }

    .app-shell { position: relative; z-index: 1; width: 100%; max-width: 720px; height: 100dvh; display: flex; flex-direction: column; }

    .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(0,255,255,0.2); }
    .logo { font-family: 'Arial Black', sans-serif; font-size: 1.25rem; color: #33FFFF; text-shadow: 0 0 14px #33FFFFaa; letter-spacing: 0.04em; }
    .header-dot { width: 9px; height: 9px; border-radius: 50%; background: #33FFFF; box-shadow: 0 0 8px #33FFFF; margin-left: auto; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: rgba(0,255,255,0.2) transparent; }

    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble { max-width: 82%; padding: 12px 16px; border-radius: 16px; font-size: 0.92rem; line-height: 1.65; word-break: break-word; animation: pop 0.18s ease; }
    .bubble.user { background: rgba(0,255,255,0.15); border: 1px solid rgba(0,255,255,0.4); color: #fff; border-bottom-right-radius: 4px; }
    .bubble.assistant { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1); color: #eee; border-bottom-left-radius: 4px; }

    /* ── Markdown styles ── */
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1 { font-size: 1.25em; font-weight: 700; margin: 12px 0 6px; color: #33FFFF; }
    .bubble h2 { font-size: 1.12em; font-weight: 700; margin: 10px 0 5px; color: #33FFFF; }
    .bubble h3, .bubble h4 { font-size: 1em; font-weight: 700; margin: 8px 0 4px; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble strong { font-weight: 700; color: #fff; }
    .bubble em { font-style: italic; opacity: 0.9; }
    .bubble blockquote { border-left: 3px solid #33FFFF; padding-left: 12px; margin: 8px 0; opacity: 0.8; }
    .bubble hr { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
    .bubble a { color: #33FFFF; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.88em; }
    .bubble th, .bubble td { border: 1px solid rgba(255,255,255,0.15); padding: 6px 10px; }
    .bubble th { background: rgba(51,255,255,0.1); color: #33FFFF; }

    /* Inline code */
    .bubble code:not(.hljs) {
      background: rgba(51,255,255,0.1);
      border: 1px solid rgba(51,255,255,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.87em;
      color: #33FFFF;
    }

    /* Code blocks */
    .bubble pre {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 0;
      overflow-x: auto;
      position: relative;
    }
    .bubble pre code {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      color: inherit !important;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      line-height: 1.6;
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(51,255,255,0.15);
      border: 1px solid rgba(51,255,255,0.3);
      border-radius: 6px;
      color: #33FFFF;
      padding: 3px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(51,255,255,0.3); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    /* KaTeX */
    .bubble .katex { font-size: 1.05em; }
    .bubble .katex-display { margin: 10px 0 !important; text-align: center; overflow-x: auto; }

    /* Typing dots */
    .bubble.typing { display: flex; gap: 6px; align-items: center; padding: 14px 18px; }
    .bubble.typing span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #33FFFF; opacity: 0.5; animation: bounce 1.2s infinite; }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-7px); opacity: 1; } }
    @keyframes pop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* Input */
    .chat-input-area { display: flex; align-items: flex-end; gap: 10px; padding: 14px 18px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(0,255,255,0.2); }
    .chat-input { flex: 1; resize: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(0,255,255,0.25); border-radius: 12px; padding: 11px 15px; color: #fff; font-family: Arial, sans-serif; font-size: 0.92rem; line-height: 1.5; max-height: 130px; overflow-y: auto; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .chat-input:focus { border-color: #33FFFF; box-shadow: 0 0 10px rgba(51,255,255,0.25); }
    .chat-input::placeholder { color: rgba(255,255,255,0.3); }
    .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn { flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%; background: transparent; border: 1.5px solid #33FFFF; color: #33FFFF; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, box-shadow 0.2s, transform 0.1s; }
    .send-btn:hover:not(:disabled) { background: rgba(51,255,255,0.15); box-shadow: 0 0 12px rgba(51,255,255,0.5); }
    .send-btn:active:not(:disabled) { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="particles-js"></div>
<div class="app-shell">
  <header class="chat-header">
    <span class="logo">ChocolatitoAI</span>
    <div class="header-dot"></div>
  </header>
  <main class="chat-messages" id="messages">
    <div class="bubble-row assistant">
      <div class="bubble assistant">¡Hola! Soy <strong>ChocolatitoAI</strong>. ¿En qué te puedo ayudar hoy?</div>
    </div>
  </main>
  <footer class="chat-input-area">
    <textarea id="inputBox" class="chat-input" placeholder="Escribe un mensaje... (Enter para enviar)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80, density: { enable: true, value_area: 800 } },
    color: { value: ["#FF0000","#00FF00","#0000FF","#FFFF00","#00FFFF","#FF00FF"] },
    shape: { type: "circle", stroke: { width: 0, color: "#000000" } },
    opacity: { value: 0.5, random: false },
    size: { value: 3, random: true },
    line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
    move: { enable: true, speed: 6, out_mode: "bounce", bounce: true }
  },
  interactivity: {
    detect_on: "canvas",
    events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" }, resize: true },
    modes: { repulse: { distance: 200, duration: 0.4 }, push: { particles_nb: 4 } }
  },
  retina_detect: true
});

const BACKEND_URL = "https://385fd47d-e4b4-4453-981e-7afca555f923-00-9lnnok86qrfn.picard.replit.dev/api/chat";

const messagesEl = document.getElementById("messages");
const inputBox   = document.getElementById("inputBox");
const sendBtn    = document.getElementById("sendBtn");
let history = [{ role: "assistant", content: "¡Hola! Soy **ChocolatitoAI**. ¿En qué te puedo ayudar hoy?" }];

function normalizeMath(text) {
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, l) => `\n$$\n${l.trim()}\n$$\n`);
  text = text.replace(/\\\(([\s\S]*?)\\\)/g, (_, l) => `$${l.trim()}$`);
  return text;
}

function renderContent(rawText) {
  const text = normalizeMath(rawText);
  const mathBlocks = [];
  let protected_text = text;

  protected_text = protected_text.replace(/\$\$([\s\S]*?)\$\$/g, (match, latex) => {
    const id = `MATHBLOCK${mathBlocks.length}END`;
    mathBlocks.push({ id, latex, display: true });
    return id;
  });

  protected_text = protected_text.replace(/\$([^$\n]+?)\$/g, (match, latex) => {
    const id = `MATHINLINE${mathBlocks.length}END`;
    mathBlocks.push({ id, latex, display: false });
    return id;
  });

  marked.setOptions({ breaks: true, gfm: true });
  let html = marked.parse(protected_text);

  for (const block of mathBlocks) {
    const span = document.createElement(block.display ? "div" : "span");
    try {
      katex.render(block.latex.trim(), span, { displayMode: block.display, throwOnError: false });
    } catch {
      span.textContent = block.latex;
    }
    html = html.replace(block.id, span.outerHTML);
  }

  const container = document.createElement("div");
  container.innerHTML = html;

  container.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
    const pre = block.parentElement;
    pre.style.position = "relative";
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copiar";
    btn.onclick = () => {
      navigator.clipboard.writeText(block.innerText).then(() => {
        btn.textContent = "Copiado ✓";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copiar"; btn.classList.remove("copied"); }, 2000);
      });
    };
    pre.appendChild(btn);
  });

  return container;
}

function addBubble(role, content, isTyping = false) {
  const row = document.createElement("div");
  row.className = `bubble-row ${role}`;
  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}${isTyping ? " typing" : ""}`;
  if (isTyping) {
    bubble.innerHTML = "<span></span><span></span><span></span>";
  } else {
    bubble.appendChild(renderContent(content));
  }
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || sendBtn.disabled) return;
  history.push({ role: "user", content: text });
  addBubble("user", text);
  inputBox.value = ""; inputBox.style.height = "auto";
  sendBtn.disabled = true; inputBox.disabled = true;
  const typingRow = addBubble("assistant", "", true);
  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? "Sin respuesta.";
    history.push({ role: "assistant", content: reply });
    typingRow.remove();
    addBubble("assistant", reply);
  } catch {
    typingRow.remove();
    addBubble("assistant", "Error al conectar con el servidor.");
  } finally {
    sendBtn.disabled = false; inputBox.disabled = false; inputBox.focus();
  }
}

inputBox.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 130) + "px";
});
sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
