<!-- ══ CHAT ══ -->
<div class="cai-wrapper">
  <div class="cai-shell">

    <header class="cai-header">
      <span class="cai-logo">ChocolatitoAI</span>
      <div class="cai-dot"></div>
    </header>

    <main class="cai-messages" id="cai-messages">
      <div class="bubble-row assistant">
        <div class="bubble assistant">¡Hola! Soy <strong>ChocolatitoAI</strong>. ¿En qué te puedo ayudar hoy?</div>
      </div>
    </main>

    <footer class="cai-input-area">
      <textarea id="cai-input" class="cai-input" placeholder="Escribe un mensaje… (Enter para enviar)" rows="1"></textarea>
      <button class="cai-send" id="cai-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>

  </div>
</div>
