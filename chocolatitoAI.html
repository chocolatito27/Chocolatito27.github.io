<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChocolatitoAI 🍫</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

/* MENSAJES */
.msg {
  padding: 12px;
  border-radius: 12px;
  margin: 5px 0;
  max-width: 80%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #ff7b00;
  align-self: flex-end;
}

.bot {
  background: #262626;
  align-self: flex-start;
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  margin-left: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #ff7b00;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .msg {
    max-width: 95%;
  }
}
</style>

</head>
<body>

<header>🍫 ChocolatitoAI</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Escribe algo..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

const API_URL = "https://index-creator.tomasaraujoteja.replit.app/chat";

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Escribiendo...";
  chat.appendChild(typing);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();

    typing.remove();
    addMessage(data.choices[0].message.content, "bot");

  } catch (err) {
    typing.remove();
    addMessage("Error conectando 😢", "bot");
  }
}
</script>

</body>
</html>
