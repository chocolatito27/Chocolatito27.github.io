<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocolatitoAI</title>

  <!-- KaTeX (matemáticas) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

  <!-- highlight.js (colores de código) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- marked (markdown) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- particles -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    /*
    ╔══════════════════════════════════════════════════════════════╗
    ║  AJUSTE: cambia el valor de --menu-h al alto de tu menú.    ║
    ║  Ejemplos: 60px, 70px, 80px. Si no hay menú usa 0px.        ║
    ╚══════════════════════════════════════════════════════════════╝
    */
    :root {
      --menu-h: 70px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .cai-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--menu-h));
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    #particles-js {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #000;
    }

    .cai-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .cai-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid rgba(0,255,255,0.2);
      flex-shrink: 0;
    }
    .cai-logo {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 1.2rem;
      color: #33FFFF;
      text-shadow: 0 0 14px rgba(51,255,255,0.7);
      letter-spacing: 0.04em;
    }
    .cai-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #33FFFF;
      box-shadow: 0 0 8px #33FFFF;
      margin-left: auto;
      flex-shrink: 0;
    }

    .cai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,255,255,0.2) transparent;
    }
    .cai-messages::-webkit-scrollbar { width: 5px; }
    .cai-messages::-webkit-scrollbar-track { background: transparent; }
    .cai-messages::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 10px; }

    .bubble-row { display: flex; }
    .bubble-row.user      { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.7;
      word-break: break-word;
      animation: cai-pop 0.18s ease;
    }
    .bubble.user {
      background: rgba(0,255,255,0.15);
      border: 1px solid rgba(0,255,255,0.4);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      color: #eee;
      border-bottom-left-radius: 4px;
    }

    .bubble p               { margin: 0 0 8px; }
    .bubble p:last-child    { margin-bottom: 0; }
    .bubble h1              { font-size: 1.25em; font-weight: 700; margin: 12px 0 6px; color: #33FFFF; }
    .bubble h2              { font-size: 1.1em;  font-weight: 700; margin: 10px 0 5px; color: #33FFFF; }
    .bubble h3, .bubble h4  { font-size: 1em;   font-weight: 700; margin: 8px 0 4px; }
    .bubble ul, .bubble ol  { padding-left: 22px; margin: 6px 0; }
    .bubble li              { margin: 3px 0; }
    .bubble strong          { font-weight: 700; color: #fff; }
    .bubble em              { font-style: italic; opacity: 0.9; }
    .bubble blockquote      { border-left: 3px solid #33FFFF; padding-left: 12px; margin: 8px 0; opacity: 0.8; }
    .bubble hr              { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
    .bubble a               { color: #33FFFF; }
    .bubble table           { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.88em; }
    .bubble th, .bubble td  { border: 1px solid rgba(255,255,255,0.15); padding: 6px 10px; }
    .bubble th              { background: rgba(51,255,255,0.1); color: #33FFFF; }

    .bubble code:not(.hljs) {
      background: rgba(51,255,255,0.1);
      border: 1px solid rgba(51,255,255,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.87em;
      color: #33FFFF;
    }

    .bubble pre {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 0;
      overflow-x: auto;
      position: relative;
    }
    .bubble pre code {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      color: inherit !important;
      font-family: 'Courier New', monospace;
      font-size: 0.84em;
      line-height: 1.6;
    }

    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(51,255,255,0.12);
      border: 1px solid rgba(51,255,255,0.3);
      border-radius: 6px;
      color: #33FFFF;
      padding: 3px 9px;
      font-size: 0.74rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover  { background: rgba(51,255,255,0.28); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    .bubble .katex         { font-size: 1.05em; }
    .bubble .katex-display { margin: 10px 0 !important; text-align: center; overflow-x: auto; }

    .bubble.typing { display: flex; gap: 6px; align-items: center; padding: 14px 18px; }
    .bubble.typing span {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #33FFFF; opacity: 0.5;
      animation: cai-bounce 1.2s infinite;
    }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes cai-bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }
    @keyframes cai-pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .cai-input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 18px;
      background: rgba(0,0,0,0.85);
      border-top: 1px solid rgba(0,255,255,0.2);
      flex-shrink: 0;
    }
    .cai-input {
      flex: 1; resize: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,255,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.92rem;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .cai-input:focus        { border-color: #33FFFF; box-shadow: 0 0 10px rgba(51,255,255,0.25); }
    .cai-input::placeholder { color: rgba(255,255,255,0.3); }
    .cai-input:disabled     { opacity: 0.4; cursor: not-allowed; }

    .cai-send {
      flex-shrink: 0; width: 44px; height: 44px;
      border-radius: 50%; background: transparent;
      border: 1.5px solid #33FFFF; color: #33FFFF; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .cai-send:hover:not(:disabled)  { background: rgba(51,255,255,0.15); box-shadow: 0 0 12px rgba(51,255,255,0.5); }
    .cai-send:active:not(:disabled) { transform: scale(0.9); }
    .cai-send:disabled              { opacity: 0.3; cursor: not-allowed; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .cai-header     { padding: 10px 14px; }
      .cai-logo       { font-size: 1rem; }
      .cai-messages   { padding: 14px 10px; gap: 10px; }
      .bubble         { max-width: 92%; font-size: 0.88rem; padding: 10px 13px; }
      .cai-input-area { padding: 10px; gap: 8px; }
      .cai-input      { font-size: 0.88rem; padding: 9px 12px; }
      .cai-send       { width: 40px; height: 40px; }
    }
    @media (max-width: 400px) {
      .bubble   { max-width: 96%; }
      .cai-logo { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="cai-wrapper">
  <div id="particles-js"></div>

  <div class="cai-shell">
    <header class="cai-header">
      <span class="cai-logo">ChocolatitoAI</span>
      <div class="cai-dot"></div>
    </header>

    <main class="cai-messages" id="cai-messages">
      <div class="bubble-row assistant">
        <div class="bubble assistant">¡Hola! Soy <strong>ChocolatitoAI</strong>. ¿En qué te puedo ayudar hoy?</div>
      </div>
    </main>

    <footer class="cai-input-area">
      <textarea id="cai-input" class="cai-input" placeholder="Escribe un mensaje… (Enter para enviar)" rows="1"></textarea>
      <button class="cai-send" id="cai-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>
  </div>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number:      { value: 80, density: { enable: true, value_area: 800 } },
    color:       { value: ["#FF0000","#00FF00","#0000FF","#FFFF00","#00FFFF","#FF00FF"] },
    shape:       { type: "circle", stroke: { width: 0, color: "#000000" } },
    opacity:     { value: 0.5, random: false },
    size:        { value: 3, random: true },
    line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
    move:        { enable: true, speed: 6, out_mode: "bounce", bounce: true }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: { enable: true, mode: "repulse" },
      onclick:  { enable: true, mode: "push" },
      resize:   true
    },
    modes: {
      repulse: { distance: 200, duration: 0.4 },
      push:    { particles_nb: 4 }
    }
  },
  retina_detect: true
});

const BACKEND_URL = "https://385fd47d-e4b4-4453-981e-7afca555f923-00-9lnnok86qrfn.picard.replit.dev/api/chat";

const messagesEl = document.getElementById("cai-messages");
const inputBox   = document.getElementById("cai-input");
const sendBtn    = document.getElementById("cai-send");
let chatHistory  = [{ role: "assistant", content: "¡Hola! Soy **ChocolatitoAI**. ¿En qué te puedo ayudar hoy?" }];

function normalizeMath(text) {
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, l) => `\n$$\n${l.trim()}\n$$\n`);
  text = text.replace(/\\\(([\s\S]*?)\\\)/g, (_, l) => `$${l.trim()}$`);
  return text;
}

function renderContent(rawText) {
  const text = normalizeMath(rawText);
  const mathBlocks = [];

  let safe = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, latex) => {
    const id = `MATHBLK${mathBlocks.length}ENDBLK`;
    mathBlocks.push({ id, latex, display: true });
    return id;
  });
  safe = safe.replace(/\$([^$\n]+?)\$/g, (_, latex) => {
    const id = `MATHINL${mathBlocks.length}ENDINL`;
    mathBlocks.push({ id, latex, display: false });
    return id;
  });

  marked.setOptions({ breaks: true, gfm: true });
  let html = marked.parse(safe);

  for (const blk of mathBlocks) {
    const el = document.createElement(blk.display ? "div" : "span");
    try { katex.render(blk.latex.trim(), el, { displayMode: blk.display, throwOnError: false }); }
    catch { el.textContent = blk.latex; }
    html = html.replace(blk.id, el.outerHTML);
  }

  const container = document.createElement("div");
  container.innerHTML = html;

  container.querySelectorAll("pre code").forEach(code => {
    hljs.highlightElement(code);
    const pre = code.parentElement;
    pre.style.position = "relative";
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copiar";
    btn.onclick = () => {
      navigator.clipboard.writeText(code.innerText).then(() => {
        btn.textContent = "Copiado ✓";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copiar"; btn.classList.remove("copied"); }, 2000);
      }).catch(() => {});
    };
    pre.appendChild(btn);
  });

  return container;
}

function addBubble(role, content, isTyping = false) {
  const row    = document.createElement("div");
  row.className = `bubble-row ${role}`;
  const bubble  = document.createElement("div");
  bubble.className = `bubble ${role}${isTyping ? " typing" : ""}`;
  if (isTyping) {
    bubble.innerHTML = "<span></span><span></span><span></span>";
  } else {
    bubble.appendChild(renderContent(content));
  }
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || sendBtn.disabled) return;

  chatHistory.push({ role: "user", content: text });
  addBubble("user", text);
  inputBox.value = "";
  inputBox.style.height = "auto";
  sendBtn.disabled = true;
  inputBox.disabled = true;

  const typingRow = addBubble("assistant", "", true);

  try {
    const res  = await fetch(BACKEND_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ messages: chatHistory })
    });
    const data  = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? "Sin respuesta.";
    chatHistory.push({ role: "assistant", content: reply });
    typingRow.remove();
    addBubble("assistant", reply);
  } catch {
    typingRow.remove();
    addBubble("assistant", "No se pudo conectar con el servidor. Intenta de nuevo.");
  } finally {
    sendBtn.disabled  = false;
    inputBox.disabled = false;
    inputBox.focus();
  }
}

inputBox.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + "px";
});
sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
