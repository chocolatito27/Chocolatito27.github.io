<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocolatitoAI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { font-family: Arial, sans-serif; background: #000; color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    #particles-js { position: fixed; inset: 0; z-index: 0; background: #000; }
    .app-shell { position: relative; z-index: 1; width: 100%; max-width: 720px; height: 100dvh; display: flex; flex-direction: column; background: rgba(10,10,10,0.75); border-left: 1px solid rgba(51,255,255,0.15); border-right: 1px solid rgba(51,255,255,0.15); backdrop-filter: blur(6px); }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid rgba(51,255,255,0.15); background: rgba(0,0,0,0.6); }
    .chat-header .logo { font-family: 'Arial Black', sans-serif; font-size: 1.2rem; color: #33FFFF; text-shadow: 0 0 12px #33FFFF88; letter-spacing: 0.03em; }
    .header-dot { width: 9px; height: 9px; border-radius: 50%; background: #33FFFF; box-shadow: 0 0 8px #33FFFF; margin-left: auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: rgba(51,255,255,0.2) transparent; }
    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }
    .bubble { max-width: 78%; padding: 11px 15px; border-radius: 16px; font-size: 0.92rem; line-height: 1.6; word-break: break-word; animation: pop 0.18s ease; }
    .bubble.user { background: rgba(51,255,255,0.18); color: #fff; border: 1px solid rgba(51,255,255,0.35); border-bottom-right-radius: 4px; }
    .bubble.assistant { background: rgba(255,255,255,0.05); color: #eee; border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
    .bubble .katex { font-size: 1em; }
    .bubble .katex-display { margin: 8px 0; overflow-x: auto; }
    .bubble code { background: rgba(51,255,255,0.1); border-radius: 4px; padding: 1px 5px; font-size: 0.88em; color: #33FFFF; }
    .bubble.typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .bubble.typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #33FFFF; opacity: 0.5; animation: bounce 1.2s infinite; }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-7px); opacity: 1; } }
    @keyframes pop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .chat-input-area { display: flex; align-items: flex-end; gap: 10px; padding: 14px 18px; border-top: 1px solid rgba(51,255,255,0.15); background: rgba(0,0,0,0.6); }
    .chat-input { flex: 1; resize: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(51,255,255,0.25); border-radius: 12px; padding: 11px 15px; color: #fff; font-family: Arial, sans-serif; font-size: 0.92rem; line-height: 1.5; max-height: 130px; overflow-y: auto; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: #33FFFF; box-shadow: 0 0 8px rgba(51,255,255,0.2); }
    .chat-input::placeholder { color: rgba(255,255,255,0.35); }
    .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn { flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; background: transparent; border: 1.5px solid #33FFFF; color: #33FFFF; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; }
    .send-btn:hover:not(:disabled) { background: rgba(51,255,255,0.15); box-shadow: 0 0 10px rgba(51,255,255,0.4); }
    .send-btn:active:not(:disabled) { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="particles-js"></div>
<div class="app-shell">
  <header class="chat-header">
    <span class="logo">ChocolatitoAI</span>
    <div class="header-dot"></div>
  </header>
  <main class="chat-messages" id="messages">
    <div class="bubble-row assistant">
      <div class="bubble assistant">¡Hola! Soy ChocolatitoAI. ¿En qué te puedo ayudar hoy?</div>
    </div>
  </main>
  <footer class="chat-input-area">
    <textarea id="inputBox" class="chat-input" placeholder="Escribe un mensaje... (Enter para enviar)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<script>
  particlesJS("particles-js", {
    particles: {
      number: { value: 80, density: { enable: true, value_area: 800 } },
      color: { value: "#33FFFF" },
      shape: { type: "circle" },
      opacity: { value: 0.4, random: true },
      size: { value: 2.5, random: true },
      line_linked: { enable: true, distance: 130, color: "#33FFFF", opacity: 0.15, width: 1 },
      move: { enable: true, speed: 1.5, random: true, out_mode: "out" }
    },
    interactivity: {
      detect_on: "canvas",
      events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: false } },
      modes: { grab: { distance: 140, line_linked: { opacity: 0.4 } } }
    }
  });

  const BACKEND_URL = "https://385fd47d-e4b4-4453-981e-7afca555f923-00-9lnnok86qrfn.picard.replit.dev/api/chat";

  const SYSTEM_MSG = {
    role: "system",
    content: "Eres ChocolatitoAI, un asistente amable. Cuando uses matemáticas, SIEMPRE escribe las fórmulas en LaTeX: usa $...$ para expresiones en línea y $$...$$ para expresiones en bloque. Por ejemplo: la raíz cuadrada se escribe $\\sqrt{x}$, una fracción $\\frac{a}{b}$, integral $\\int_{a}^{b} f(x)\\,dx$. Nunca escribas sqrt(), frac() o notación de programación — usa siempre LaTeX."
  };

  const messagesEl = document.getElementById("messages");
  const inputBox   = document.getElementById("inputBox");
  const sendBtn    = document.getElementById("sendBtn");
  let history = [{ role: "assistant", content: "¡Hola! Soy ChocolatitoAI. ¿En qué te puedo ayudar hoy?" }];

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  }

  function renderContent(text) {
    const div = document.createElement("div");
    const parts = text.split(/((?:\$\$[\s\S]*?\$\$)|(?:\$[^$\n]+?\$))/g);
    let html = "";
    for (const part of parts) {
      if (part.startsWith("$$") && part.endsWith("$$") && part.length > 4) {
        const latex = part.slice(2, -2);
        try { const s = document.createElement("div"); katex.render(latex, s, { displayMode: true, throwOnError: false }); html += s.outerHTML; }
        catch { html += escapeHtml(part); }
      } else if (part.startsWith("$") && part.endsWith("$") && part.length > 2) {
        const latex = part.slice(1, -1);
        try { const s = document.createElement("span"); katex.render(latex, s, { displayMode: false, throwOnError: false }); html += s.outerHTML; }
        catch { html += escapeHtml(part); }
      } else { html += escapeHtml(part); }
    }
    div.innerHTML = html;
    return div;
  }

  function addBubble(role, content, isTyping = false) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}${isTyping ? " typing" : ""}`;
    if (isTyping) { bubble.innerHTML = "<span></span><span></span><span></span>"; }
    else { bubble.appendChild(renderContent(content)); }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || sendBtn.disabled) return;
    history.push({ role: "user", content: text });
    addBubble("user", text);
    inputBox.value = ""; inputBox.style.height = "auto";
    sendBtn.disabled = true; inputBox.disabled = true;
    const typingRow = addBubble("assistant", "", true);
    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: [SYSTEM_MSG, ...history] })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? "Sin respuesta.";
      history.push({ role: "assistant", content: reply });
      typingRow.remove();
      addBubble("assistant", reply);
    } catch {
      typingRow.remove();
      addBubble("assistant", "Error al conectar con el servidor.");
    } finally {
      sendBtn.disabled = false; inputBox.disabled = false; inputBox.focus();
    }
  }

  inputBox.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inputBox.addEventListener("input", () => { inputBox.style.height = "auto"; inputBox.style.height = Math.min(inputBox.scrollHeight, 130) + "px"; });
  sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
