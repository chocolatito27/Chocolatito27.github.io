<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChocolatitoWeb</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Protección: si no hay sesión, va al login -->
    <script>
        if (!localStorage.getItem('cw_token')) {
            window.location.replace('login.html');
        }
    </script>
</head>
<body class="home-page">
    <div id="particles-js"></div>

    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="back-arrow" onclick="toggleMenu()">&#10094;</span>
        </div>
        <ul>
            <li><a href="#hero" class="active" onclick="toggleMenu()">Inicio</a></li>
            <li><a href="chocolatitoAI.html">ChocolatitoAI</a></li>
            <li><a href="entretenimiento.html">Entretenimiento</a></li>
            <li><a href="juegos.html">Juegos</a></li>
        </ul>
    </div>

    <!-- ══ HERO: Logo arrastrable + Nombre ══ -->
    <section class="hero" id="hero">
        <div class="hero-logo-wrap" id="hero-logo-wrap">
            <img src="favicon.png" alt="Chocolatito" class="hero-logo" id="hero-logo" />
        </div>
        <h1 class="hero-title">Chocolatito<span>Web</span></h1>
    </section>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script src="session.js"></script>

    <!-- Logo arrastrable -->
    <script>
    (function() {
        const logo = document.getElementById('hero-logo-wrap');
        let isDragging = false;
        let startX, startY, origX, origY;

        function onStart(e) {
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            const rect = logo.getBoundingClientRect();
            origX = rect.left;
            origY = rect.top;
            startX = touch.clientX;
            startY = touch.clientY;
            logo.style.position = 'fixed';
            logo.style.left = origX + 'px';
            logo.style.top = origY + 'px';
            logo.style.zIndex = '9999';
            logo.style.cursor = 'grabbing';
            logo.style.transition = 'none';
            e.preventDefault();
        }

        function onMove(e) {
            if (!isDragging) return;
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            logo.style.left = (origX + dx) + 'px';
            logo.style.top = (origY + dy) + 'px';
            e.preventDefault();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            logo.style.cursor = 'grab';
        }

        logo.style.cursor = 'grab';
        logo.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        logo.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
    })();
    </script>
</body>
</html>
