    <!-- Logo arrastrable -->
    <script>
    (function() {
        const logo = document.getElementById('hero-logo-wrap');
        let isDragging = false;
        let startX, startY, startLeft, startTop;

        function init() {
            // Calculate actual centered position and set it as explicit left/top
            const rect = logo.getBoundingClientRect();
            logo.style.transform = 'none';
            logo.style.left = rect.left + 'px';
            logo.style.top = rect.top + 'px';
            logo.style.cursor = 'grab';
        }

        function onStart(e) {
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            startLeft = parseInt(logo.style.left) || 0;
            startTop = parseInt(logo.style.top) || 0;
            logo.style.cursor = 'grabbing';
            e.preventDefault();
        }

        function onMove(e) {
            if (!isDragging) return;
            const touch = e.touches ? e.touches[0] : e;
            logo.style.left = (startLeft + touch.clientX - startX) + 'px';
            logo.style.top = (startTop + touch.clientY - startY) + 'px';
            e.preventDefault();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            logo.style.cursor = 'grab';
        }

        // Wait for layout to settle, then init position
        window.addEventListener('load', init);
        window.addEventListener('resize', init);

        logo.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        logo.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
    })();
    </script>
<script src="sidebar.js"></script>
