    <!-- Logo arrastrable (usa transform para no romper el layout en flujo) -->
    <script>
    (function() {
        const logo = document.getElementById('hero-logo-wrap');
        if (!logo) return;
        let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0, cx = 0, cy = 0;

        function start(e) {
            dragging = true;
            const t = e.touches ? e.touches[0] : e;
            sx = t.clientX; sy = t.clientY;
            logo.style.cursor = 'grabbing';
            logo.classList.add('dragging');
            e.preventDefault();
        }
        function move(e) {
            if (!dragging) return;
            const t = e.touches ? e.touches[0] : e;
            cx = ox + (t.clientX - sx);
            cy = oy + (t.clientY - sy);
            logo.style.transform = 'translate(' + cx + 'px,' + cy + 'px)';
            e.preventDefault();
        }
        function end() {
            if (!dragging) return;
            dragging = false; ox = cx; oy = cy;
            logo.style.cursor = 'grab';
            logo.classList.remove('dragging');
        }

        logo.addEventListener('mousedown', start);
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', end);
        logo.addEventListener('touchstart', start, { passive: false });
        document.addEventListener('touchmove', move, { passive: false });
        document.addEventListener('touchend', end);
    })();
    </script>
